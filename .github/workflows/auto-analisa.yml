name: AI Market Analyzer Scheduled

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: 

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Ambil Kode dari Github
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Jalankan AI Analisa Market
        run: node bot.js
